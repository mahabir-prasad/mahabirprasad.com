  image: ""
  summary: I am a computational chemist specializing in molecular simulations and the atomistic design of functional materials for sustainable energy and environmental applications,
           with expertise in density functional theory (DFT), molecular dynamics (MD), and enhanced sampling techniques.
           My research focuses on understanding ion transport, molecular interactions, and structure–property relationships in two-dimensional and nanoporous materials to advance technologies for energy harvesting
           and electrochemical energy storage.


